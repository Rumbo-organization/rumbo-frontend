# CI del SPA: formato (prettier --check), instala y buildea (vite build compila
# todos los .jsx — atrapa errores de sintaxis y de imports). Sin lint ni tests
# configurados todavía; cuando existan (`pnpm lint` / `pnpm test`), agregar los
# pasos acá. El deploy y su status en el PR los maneja la integración de Vercel.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm build
